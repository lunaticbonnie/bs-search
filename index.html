<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=chevron_right" />
  <link rel="stylesheet" href="qiss.css" />
  <style>
    html {
      overflow-y: scroll;
    }
    body {
      background: #272831;
      color: white;
      font-family: "Motiva Sans", sans-serif;
      font-size: 16px;
    }
    .icon {
      user-select: none;
    }
    .icon-button {
      color: #c6d4df;
      cursor: default;
    }
    .icon-button[data-disabled="false"] {
      cursor: pointer;
    }
    .icon-button[data-disabled="false"]:hover {
      color: white;
    }
    hr {
      border-color: #c6d4df;
    }

    a {
      color: #66C0F4;
      text-decoration: none;
    }
    .table {
      padding: 4px;
      gap: 6px;
    }
    .table-header {
      font-size: 20px;
    }
    .table-row {
      width: 100%;
    }
    .tags {
      padding: 2px;
      background: #222225;
    }
    .tag {
      display: inline-block;
      line-height: 19px;
      padding: 0 7px;
      color: #67c1f5;
      color: #acb2b8;
      background: rgba(103, 193, 245, 0.2);
      box-shadow: none;
      margin-right: 2px;
      border-radius: 2px;
      font-size: 16px;
    }
  </style>
  <script type="module" src="app.mjs"></script>
</head>
<body>
</body>
</html>
